name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git curl fakeroot
        git clone --recursive --depth=1 https://github.com/theos/theos.git $HOME/theos
        curl -LO https://github.com/sbingner/llvm-project/releases/latest/download/linux-ios-arm64e-clang-toolchain.tar.lzma
        tar -xf linux-ios-arm64e-clang-toolchain.tar.lzma -C $HOME/theos/toolchain --strip-components=1
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip -q master.zip
        mv sdks-master/* $HOME/theos/sdks/

    - name: Build
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: DDZHelper-deb
        path: packages/*.deb
