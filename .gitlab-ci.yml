image: ubuntu:20.04

stages:
  - build

before_script:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -qq
  - apt-get install -y git curl fakeroot zip unzip xz-utils build-essential rsync libncurses5 libxml2

build:
  stage: build
  script:
    - git clone --recursive --depth=1 https://github.com/theos/theos.git $HOME/theos
    - curl -LO https://github.com/sbingner/llvm-project/releases/latest/download/linux-ios-arm64e-clang-toolchain.tar.lzma
    - mkdir -p $HOME/theos/toolchain/linux/iphone
    - tar -xf linux-ios-arm64e-clang-toolchain.tar.lzma -C $HOME/theos/toolchain/linux/iphone --strip-components=1
    - git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks-repo
    - cp -r $HOME/theos/sdks-repo/iPhoneOS13.7.sdk $HOME/theos/sdks/
    - export THEOS=$HOME/theos
    - export SDKVERSION=13.7
    - make package FINALPACKAGE=1
    - ls -la .theos/_/
    - ls -la .theos/_/Library/LaunchDaemons/ || echo "LaunchDaemons not found"
    - mkdir -p Payload
    - cp -r .theos/_/Applications/DDZHelper.app Payload/
    - ls -la Payload/DDZHelper.app/
    - cd .theos/_/ && zip -r ../../DDZHelper.tipa . && cd ../..
    - mv DDZHelper.tipa DDZHelper.ipa
    - unzip -l DDZHelper.ipa
  artifacts:
    paths:
      - DDZHelper.ipa

  artifacts:
    paths:
      - DDZHelper.ipa
